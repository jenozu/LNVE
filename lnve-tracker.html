<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LNVE — Project Tracker</title>
<style>
:root {
  --bg:        #0f1117;
  --surface:   #1a1d27;
  --surface2:  #22263a;
  --border:    #2e3350;
  --accent:    #4f8ef7;
  --accent2:   #3ecfb2;
  --warn:      #f5a623;
  --danger:    #e85555;
  --success:   #3ecf8e;
  --text:      #e8eaf0;
  --muted:     #7a809e;
  --radius:    10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;line-height:1.5;min-height:100vh}

/* ── Header ── */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:18px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:14px}
.logo{font-size:18px;font-weight:700;letter-spacing:-.3px}
.logo span{color:var(--accent)}
.tagline{color:var(--muted);font-size:12px}
.header-right{display:flex;align-items:center;gap:16px}
.filter-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;transition:all .15s}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.filter-btn:hover:not(.active){border-color:var(--accent);color:var(--accent)}

/* ── Progress bar ── */
.progress-row{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;gap:16px}
.progress-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .4s ease}
.progress-label{font-size:12px;color:var(--muted);white-space:nowrap;min-width:120px;text-align:right}

/* ── Stats row ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.stat{background:var(--surface);padding:16px 24px;text-align:center}
.stat-num{font-size:26px;font-weight:700;letter-spacing:-.5px}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.num-done{color:var(--success)}
.num-partial{color:var(--warn)}
.num-todo{color:var(--muted)}
.num-total{color:var(--text)}

/* ── Main layout ── */
.main{max-width:960px;margin:0 auto;padding:28px 20px}

/* ── Phase cards ── */
.phase{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;transition:border-color .15s}
.phase:hover{border-color:var(--border)}

.phase-header{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none;transition:background .1s}
.phase-header:hover{background:var(--surface2)}
.phase-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot-done{background:var(--success)}
.dot-partial{background:var(--warn)}
.dot-todo{background:var(--border)}
.phase-name{font-weight:600;font-size:14px;flex:1}
.phase-badge{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600;flex-shrink:0}
.badge-done{background:rgba(62,207,142,.15);color:var(--success)}
.badge-partial{background:rgba(245,166,35,.15);color:var(--warn)}
.badge-todo{background:rgba(122,128,158,.1);color:var(--muted)}
.phase-chevron{color:var(--muted);font-size:11px;transition:transform .2s;flex-shrink:0}
.phase-chevron.open{transform:rotate(180deg)}
.phase-mini-bar{width:80px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;flex-shrink:0}
.phase-mini-fill{height:100%;border-radius:2px;transition:width .3s}

/* ── Task list ── */
.task-list{border-top:1px solid var(--border)}
.task{display:flex;align-items:flex-start;gap:0;border-bottom:1px solid var(--border);transition:background .1s}
.task:last-child{border-bottom:none}
.task.done .task-title{text-decoration:line-through;color:var(--muted)}

/* checkbox cell */
.task-check{width:48px;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:14px 0;cursor:pointer}
.cb{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .15s;cursor:pointer}
.cb:hover{border-color:var(--accent)}
.cb.checked{background:var(--success);border-color:var(--success)}
.cb.checked::after{content:"✓";font-size:11px;color:#111;font-weight:700;line-height:1}
.cb.partial{background:var(--warn);border-color:var(--warn)}
.cb.partial::after{content:"~";font-size:12px;color:#111;font-weight:700;line-height:1}

/* task content — clickable to expand */
.task-body{flex:1;padding:12px 18px 12px 0;cursor:pointer}
.task-body:hover{color:var(--accent)}
.task-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.task-title{font-size:13.5px;line-height:1.4}
.task-tag{font-size:10px;padding:1px 7px;border-radius:10px;font-weight:600;white-space:nowrap}
.tag-next{background:rgba(79,142,247,.2);color:var(--accent)}
.tag-security{background:rgba(232,85,85,.15);color:var(--danger)}
.task-detail{margin-top:10px;padding:12px 14px;background:var(--surface2);border-radius:8px;border-left:3px solid var(--accent);font-size:13px;color:var(--muted);line-height:1.7;display:none}
.task-detail.open{display:block}
.task-detail code{background:rgba(79,142,247,.12);color:var(--accent);padding:1px 5px;border-radius:3px;font-family:monospace;font-size:12px}
.task-detail ul{margin:6px 0 6px 16px}
.task-detail li{margin:3px 0}
.task-detail strong{color:var(--text)}

/* ── Empty state ── */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-icon{font-size:32px;margin-bottom:12px}

/* ── Footer ── */
.footer{text-align:center;padding:24px;color:var(--muted);font-size:12px;border-top:1px solid var(--border);margin-top:20px}
.footer a{color:var(--accent);text-decoration:none}
.footer a:hover{text-decoration:underline}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">LNVE<span>.</span></div>
    <div class="tagline">Project Tracker — Local Niche Validation Engine</div>
  </div>
  <div class="header-right">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('todo',this)">Remaining</button>
    <button class="filter-btn" onclick="setFilter('done',this)">Complete</button>
    <button class="filter-btn" onclick="setFilter('next',this)">Next up</button>
  </div>
</div>

<div class="progress-row">
  <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="progress-label" id="prog-label">Loading…</div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-num num-done" id="s-done">0</div><div class="stat-lbl">Complete</div></div>
  <div class="stat"><div class="stat-num num-partial" id="s-partial">0</div><div class="stat-lbl">In progress</div></div>
  <div class="stat"><div class="stat-num num-todo" id="s-todo">0</div><div class="stat-lbl">Remaining</div></div>
  <div class="stat"><div class="stat-num num-total" id="s-total">0</div><div class="stat-lbl">Total tasks</div></div>
</div>

<div class="main" id="main"></div>

<div class="footer">
  Repo: <a href="https://github.com/jenozu/LNVE" target="_blank">github.com/jenozu/LNVE</a>
  &nbsp;·&nbsp; Last updated: <span id="last-updated"></span>
</div>

<script>

//  status: 'done' | 'partial' | 'todo'
//  tag:    'next' | 'security' | null
// ═══════════════════════════════════════════════════════════
const PHASES = [

    id:'p1', name:'Architecture & planning', status:'done',
    tasks:[
      {id:'1a', status:'done', title:'Full architecture audit of original codebase',

      {id:'3d', status:'done', title:'core/safe_request.py — HTTP wrapper with retry and backoff',

      {id:'3e', status:'done', title:'database/repository.py — all SQLite operations',
       detail:'Single file contains every database query. WAL mode enabled (prevents "database is locked" errors under concurrent threads). Tables: searches, leads. Methods: create_search, insert_lead, update_lead_enrichment, get_analytics, etc. Add new queries here — never write raw sqlite3 calls elsewhere.'},

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
let filter = 'all';
let openTasks = new Set();

// Load saved state from localStorage
function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem('lnve-tracker') || '{}');
    if (saved.statuses) {
      PHASES.forEach(ph => ph.tasks.forEach(t => {
        if (saved.statuses[t.id]) t.status = saved.statuses[t.id];
      }));
    }
    if (saved.open) openTasks = new Set(saved.open);
  } catch(e) {}
}

function saveState() {
  const statuses = {};
  PHASES.forEach(ph => ph.tasks.forEach(t => { statuses[t.id] = t.status; }));
  localStorage.setItem('lnve-tracker', JSON.stringify({
    statuses,
    open: [...openTasks],
    updated: new Date().toISOString()
  }));
}

// ═══════════════════════════════════════════════════════════
//  STATS
// ═══════════════════════════════════════════════════════════
function calcStats() {
  let done=0, partial=0, todo=0;
  PHASES.forEach(ph => ph.tasks.forEach(t => {
    if (t.status==='done') done++;
    else if (t.status==='partial') partial++;
    else todo++;
  }));
  return {done, partial, todo, total: done+partial+todo};
}

function updateStats() {
  const s = calcStats();
  document.getElementById('s-done').textContent = s.done;
  document.getElementById('s-partial').textContent = s.partial;
  document.getElementById('s-todo').textContent = s.todo;
  document.getElementById('s-total').textContent = s.total;
  const pct = Math.round((s.done / s.total) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent =
    `${pct}% complete · ${s.done} of ${s.total} tasks done`;
}

// ═══════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════
function phaseStatus(ph) {
  const tasks = ph.tasks;
  if (tasks.every(t=>t.status==='done')) return 'done';
  if (tasks.some(t=>t.status==='done'||t.status==='partial')) return 'partial';
  return 'todo';
}

function taskMatchesFilter(t) {
  if (filter === 'all') return true;
  if (filter === 'done') return t.status === 'done';
  if (filter === 'todo') return t.status !== 'done';
  if (filter === 'next') return t.tag === 'next';
  return true;
}

function render() {
  const main = document.getElementById('main');
  main.innerHTML = '';

  let anyVisible = false;

  PHASES.forEach(ph => {
    const visibleTasks = ph.tasks.filter(taskMatchesFilter);
    if (visibleTasks.length === 0) return;
    anyVisible = true;

    const done = ph.tasks.filter(t=>t.status==='done').length;
    const pct = Math.round((done / ph.tasks.length) * 100);
    const ps = phaseStatus(ph);

    const div = document.createElement('div');
    div.className = 'phase';
    div.id = 'phase-' + ph.id;

    const headerOpen = openTasks.has(ph.id);

    let badgeCls='badge-todo', badgeTxt=`${ph.tasks.filter(t=>t.status!=='done').length} remaining`;
    if (ps==='done'){badgeCls='badge-done';badgeTxt='Complete';}
    else if (ps==='partial'){badgeCls='badge-partial';badgeTxt=`${done}/${ph.tasks.length} done`;}

    let fillColor = ps==='done'?'var(--success)':ps==='partial'?'var(--warn)':'var(--border)';

    div.innerHTML = `
      <div class="phase-header" onclick="togglePhase('${ph.id}')">
        <div class="phase-dot dot-${ps}"></div>
        <div class="phase-name">${ph.name}</div>
        <div class="phase-mini-bar"><div class="phase-mini-fill" style="width:${pct}%;background:${fillColor}"></div></div>
        <span class="phase-badge ${badgeCls}">${badgeTxt}</span>
        <span class="phase-chevron ${headerOpen?'open':''}" id="chev-${ph.id}">▾</span>
      </div>
      <div class="task-list" id="list-${ph.id}" style="display:${headerOpen?'block':'none'}">
        ${visibleTasks.map(t => renderTask(t)).join('')}
      </div>`;

    main.appendChild(div);
  });

  if (!anyVisible) {
    main.innerHTML = '<div class="empty"><div class="empty-icon">✓</div><div>No tasks match this filter.</div></div>';
  }

  updateStats();
}

function renderTask(t) {
  const isOpen = openTasks.has(t.id);
  const tagHtml = t.tag==='next'
    ? '<span class="task-tag tag-next">next up</span>'
    : t.tag==='security'
    ? '<span class="task-tag tag-security">security</span>'
    : '';
  return `
    <div class="task ${t.status}" id="task-${t.id}">
      <div class="task-check" onclick="toggleCheck('${t.id}')">
        <div class="cb ${t.status==='done'?'checked':t.status==='partial'?'partial':''}" id="cb-${t.id}"></div>
      </div>
      <div class="task-body" onclick="toggleDetail('${t.id}')">
        <div class="task-top">
          <span class="task-title" id="tt-${t.id}">${t.title}</span>
          ${tagHtml}
        </div>
        <div class="task-detail ${isOpen?'open':''}" id="detail-${t.id}">${t.detail}</div>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════
//  INTERACTIONS
// ═══════════════════════════════════════════════════════════
window.togglePhase = function(id) {
  const list = document.getElementById('list-'+id);
  const chev = document.getElementById('chev-'+id);
  const open = list.style.display !== 'none';
  list.style.display = open ? 'none' : 'block';
  chev.classList.toggle('open', !open);
  if (!open) openTasks.add(id); else openTasks.delete(id);
  saveState();
};

window.toggleDetail = function(id) {
  const detail = document.getElementById('detail-'+id);
  const isOpen = detail.classList.contains('open');
  detail.classList.toggle('open', !isOpen);
  if (!isOpen) openTasks.add(id); else openTasks.delete(id);
  saveState();
};

window.toggleCheck = function(id) {
  // Find task across all phases
  let task;
  PHASES.forEach(ph => ph.tasks.forEach(t => { if(t.id===id) task=t; }));
  if (!task) return;
  // Cycle: todo → done → todo
  task.status = task.status === 'done' ? 'todo' : 'done';
  // Update phase status badge
  PHASES.forEach(ph => {
    if (ph.tasks.find(t=>t.id===id)) {
      ph.status = phaseStatus(ph);
    }
  });
  saveState();
  render();
};

window.setFilter = function(f, btn) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
};

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
loadState();
render();

// Set last updated date
document.getElementById('last-updated').textContent = new Date().toLocaleDateString('en-CA',{year:'numeric',month:'long',day:'numeric'});
</script>
